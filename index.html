<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Photo Sphere</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #0a0a0f; font-family: sans-serif; }
        #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0f; z-index: 100; transition: opacity 0.8s ease; }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading .title { font-size: 24px; color: #ccc; letter-spacing: 4px; font-weight: 300; }
        #loading .progress-wrap { width: 220px; height: 3px; background: #1a1a24; border-radius: 2px; margin-top: 20px; overflow: hidden; }
        #loading .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #4f7aff, #6dc8ff); border-radius: 2px; transition: width 0.3s ease; }
        #loading .hint { margin-top: 16px; color: #555; }
        canvas { display: block; }
    </style>
</head>
<body>
<div id="loading">
    <div class="title">3D Photo Sphere</div>
    <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>
    <div class="hint">Loading photos...</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
var photos = [];
var n = 0;
var R = 10, W = 2.6, H = 2.6 * 0.75;
var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 3, 18);
var ren = new THREE.WebGLRenderer({ antialias: true });
ren.setSize(window.innerWidth, window.innerHeight);
ren.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(ren.domElement);
var ctr = new THREE.OrbitControls(camera, ren.domElement);
ctr.enableDamping = true; ctr.dampingFactor = 0.06;
ctr.autoRotate = true; ctr.autoRotateSpeed = 2.0;
ctr.minDistance = 6; ctr.maxDistance = 28; ctr.target.set(0, 0, 0);

// Starfield
(function() {
    var c = 3000, p = new Float32Array(c * 3);
    for (var i = 0; i < c * 3; i++) p[i] = (Math.random() - 0.5) * 300;
    var g = new THREE.BufferGeometry();
    g.setAttribute("position", new THREE.BufferAttribute(p, 3));
    scene.add(new THREE.Points(g, new THREE.PointsMaterial({
        color: 0xffffff, size: 0.15, transparent: true, opacity: 0.7, sizeAttenuation: true
    })));
})();

// Guide wireframe
(function() {
    var g = new THREE.SphereGeometry(R * 1.008, 48, 48);
    scene.add(new THREE.Mesh(g, new THREE.MeshBasicMaterial({
        color: 0x3366cc, transparent: true, opacity: 0.035, wireframe: true
    })));
})();

var golden = (1 + Math.pow(5, 0.5)) / 2;
var group = new THREE.Group();
scene.add(group);

var loaded = 0;
var progressEl = document.getElementById("progress");
var totalToLoad = 0;

// 统一 CDN 前缀
var cdnBase = "https://pub-a55fc59f7c5248379a13436957374d56.r2.dev/photos/";

function loadPhoto(idx, fileName) {
    var theta = Math.acos(1 - 2 * (idx + 0.5) / n);
    var phi = 2 * Math.PI * idx / golden;
    var x = R * Math.sin(theta) * Math.cos(phi);
    var y = R * Math.sin(theta) * Math.sin(phi);
    var z = R * Math.cos(theta);

    var img = new Image();
    img.crossOrigin = "anonymous";
    img.src = cdnBase + fileName;
    var tex = new THREE.Texture(img);
    tex.colorSpace = THREE.SRGBColorSpace;
    
    img.onload = function() {
        loaded++;
        progressEl.style.width = Math.min((loaded / totalToLoad) * 100, 100) + "%";
        if (loaded >= totalToLoad) {
            setTimeout(function() {
                document.getElementById("loading").classList.add("hidden");
            }, 400);
        }
        tex.needsUpdate = true;
    };

    img.onerror = function() {
        loaded++;
        progressEl.style.width = Math.min((loaded / totalToLoad) * 100, 100) + "%";
        if (loaded >= totalToLoad) {
            setTimeout(function() {
                document.getElementById("loading").classList.add("hidden");
            }, 400);
        }
    };

    var mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
    var mesh = new THREE.Mesh(new THREE.PlaneGeometry(W, H), mat);
    mesh.position.set(x, y, z);
    mesh.lookAt(0, 0, 0);
    mesh.rotateY(Math.PI);

    var bMat = new THREE.MeshBasicMaterial({
        color: 0xffffff, transparent: true, opacity: 0.12, side: THREE.BackSide
    });
    var border = new THREE.Mesh(
        new THREE.PlaneGeometry(W + 0.08, H + 0.08), bMat
    );
    border.position.copy(mesh.position);
    border.quaternion.copy(mesh.quaternion);

    group.add(mesh);
    group.add(border);
}

function init() {
    var foundPhotos = [];
    var checked = 0;
    var maxTry = 50;
    
    for (var i = 1; i <= maxTry; i++) (function(num) {
        var fileName = num + ".jpg";
        var img = new Image();
        img.crossOrigin = "anonymous";
        
        img.onload = function() {
            foundPhotos.push(fileName);
            checked++;
            if (checked >= maxTry) finish();
        };
        
        img.onerror = function() {
            checked++;
            if (checked >= maxTry) finish();
        };
        
        // 这里也换成 CDN
        img.src = cdnBase + fileName;
    })(i);
    
    function finish() {
        photos = foundPhotos.sort(function(a, b) {
            return a.localeCompare(b, undefined, { numeric: true });
        });
        n = photos.length;
        totalToLoad = n;
        if (n > 0) {
            for (var i = 0; i < n; i++) {
                loadPhoto(i, photos[i]);
            }
        } else {
            document.getElementById("loading").classList.add("hidden");
        }
    }
}

init();

window.addEventListener("resize", function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    ren.setSize(window.innerWidth, window.innerHeight);
});

(function loop() {
    requestAnimationFrame(loop);
    ctr.update();
    ren.render(scene, camera);
})();
</script>
</body>
</html>
